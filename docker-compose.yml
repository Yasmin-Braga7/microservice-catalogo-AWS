version: "3.9"

services:
  catalogo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biblioteca-catalogo
    restart: unless-stopped

    ports:
      - "9502:9502" # Porta pública do microsserviço de Catálogo

    environment:
      PORT: 9502
      NODE_ENV: production
      # Banco de dados e RabbitMQ (valores vêm do .env local, não commitado)
      DATABASE_URL: ${DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_RECONNECT_DELAY: 5000
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}

    env_file:
      - .env

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
